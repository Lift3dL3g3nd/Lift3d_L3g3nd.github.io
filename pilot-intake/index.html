<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Bounty-Hive Pilot Intake</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      background-color: #0f1115;
      color: #e5e7eb;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      margin: 0;
      padding: 0;
      line-height: 1.6;
    }
    .container {
      max-width: 820px;
      margin: auto;
      padding: 64px 24px;
    }
    h1, h2 {
      color: #f2c94c;
    }
    label {
      display: block;
      margin-top: 18px;
      font-weight: 600;
    }
    input, select, textarea {
      width: 100%;
      padding: 10px;
      margin-top: 6px;
      background: #141821;
      color: #fff;
      border: 1px solid #1f2430;
      border-radius: 6px;
    }
    fieldset {
      margin-top: 32px;
      border: 1px solid #1f2430;
      border-radius: 10px;
      padding: 20px;
    }
    legend {
      padding: 0 8px;
      color: #f2c94c;
      font-weight: 700;
    }
    button {
      margin-top: 32px;
      background: #f2c94c;
      color: #0f1115;
      padding: 14px 22px;
      border: none;
      border-radius: 8px;
      font-weight: 700;
      cursor: pointer;
    }
    small {
      color: #9ca3af;
    }
  </style>
</head>
<body>

<div class="container">

<h1>Bounty-Hive Pilot Intake</h1>

<p>
This form initiates a <strong>non-invasive, read-only pilot</strong>.
No exploitation, scanning, or system modification occurs.
</p>

<form action="https://formspree.io/f/mbdovlpj" method="POST">

<fieldset>
  <legend>Contact</legend>

  <label>Full Name
    <input name="name" required>
  </label>

  <label>Work Email
    <input type="email" name="email" required>
  </label>

  <label>Company
    <input name="company" required>
  </label>

  <label>Role
    <input name="role">
  </label>
</fieldset>

<fieldset>
  <legend>Environment</legend>

  <label>Primary OS
    <select name="os">
      <option>Linux</option>
      <option>macOS</option>
      <option>Windows</option>
      <option>Mixed / Unsure</option>
    </select>
  </label>

  <label>Runtime Availability
    <select name="runtime">
      <option>1 Week</option>
      <option>2 Weeks</option>
      <option>1 Month</option>
      <option>2 Months</option>
    </select>
  </label>

</fieldset>

<div class="flex justify-center">
  <button class="bg-blue-600 text-white px-4 py-2 rounded">
    Submit
  </button>
</div>

</form>

</div>

</body>
</html>
